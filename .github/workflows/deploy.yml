name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build Chinese blog posts
        run: |
          for f in blog/zh/posts/*.md; do
            [ -f "$f" ] || continue
            slug=$(basename "$f" .md)
            pandoc "$f" \
              --template blog/_template-zh.html \
              -f markdown+yaml_metadata_block \
              --metadata slug="$slug" \
              -o "blog/zh/${slug}.html"
            echo "Generated: blog/zh/${slug}.html"
          done

      - name: Build English blog posts
        run: |
          for f in blog/en/posts/*.md; do
            [ -f "$f" ] || continue
            slug=$(basename "$f" .md)
            pandoc "$f" \
              --template blog/_template-en.html \
              -f markdown+yaml_metadata_block \
              --metadata slug="$slug" \
              -o "blog/en/${slug}.html"
            echo "Generated: blog/en/${slug}.html"
          done

      - name: Generate sitemap and robots.txt
        run: |
          chmod +x scripts/generate-sitemap.sh
          # 使用站点正式域名，与 index.html / blog 中的 canonical 一致
          BASE_URL="https://eric.run.place/MermZen"
          ./scripts/generate-sitemap.sh "$BASE_URL"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
